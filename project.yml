name: ClaudeWatch
options:
  bundleIdPrefix: studio.cybertron.claudewatch
  deploymentTarget:
    macOS: "13.0"
    iOS: "16.0"
  developmentLanguage: en
  createIntermediateGroups: true
  defaultConfig: Debug
configs:
  Debug: debug
  Release: release

# Local Swift Package Manager package dependency.
# Tests live inside the package — xcodebuild against UsageCore-Package
# scheme runs them. (UsageCore is the internal library name; the
# user-facing app is Claude Watch, but the library still describes
# "usage data" conceptually.)
packages:
  UsageCore:
    path: Packages/UsageCore

settings:
  base:
    SWIFT_VERSION: "5.10"
    SWIFT_STRICT_CONCURRENCY: minimal
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    # Signing config. Debug uses automatic + your dev team for local
    # runs; Release overrides per-target to use the Developer ID
    # Application certificate so notarized DMGs work.
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: MKSL2N4Y23

# ─── Targets ────────────────────────────────────────────────────────────────

targets:

  # ===== macOS menu bar app =================================================
  ClaudeWatchMac:
    type: application
    platform: macOS
    sources:
      - path: Apps/ClaudeWatchMac
        excludes:
          - "Info.plist"
          - "ClaudeWatchMac.entitlements"
          # Belongs to the sibling App Store target — exclude here so
          # XcodeGen doesn't try to compile it into the DMG target.
          - "ClaudeWatchMacAppStore.entitlements"
      # Each .lproj/Localizable.strings is a variant of one logical
      # localized resource. XcodeGen detects the .lproj naming
      # convention and groups them automatically.
      - path: Apps/ClaudeWatchMac/Resources
    info:
      path: Apps/ClaudeWatchMac/Info.plist
      properties:
        CFBundleDisplayName: Claude Watch
        CFBundleShortVersionString: "0.1.8"
        CFBundleVersion: "10"
        # Required for App Store submission; harmless on the DMG path.
        # "developer-tools" fits — primary audience is users of
        # claude.ai / Claude Code / Anthropic API.
        LSApplicationCategoryType: public.app-category.developer-tools
        # Tells App Store Connect we use only Apple's built-in
        # cryptography (URLSession TLS, code signing, etc.) — i.e.
        # nothing that requires a U.S. BIS export-compliance review.
        # Setting this to false makes ASC skip the "App 加密文稿"
        # dialog on every new build upload.
        ITSAppUsesNonExemptEncryption: false
        # The whole point of this app — runs in menu bar, no Dock icon.
        LSUIElement: YES
        # Shown in macOS' "About Claude Watch" dialog. Must include the
        # © glyph here (unlike the App Store Connect copyright field,
        # which Apple prefixes automatically).
        NSHumanReadableCopyright: "© 2026 Cybertron Studio"
        NSSupportsAutomaticTermination: YES
        NSSupportsSuddenTermination: YES
        # Languages the bundle ships translations for. macOS picks the
        # closest match to the user's preferred language list at
        # ~/Library/Preferences/.GlobalPreferences.plist; falls back to
        # CFBundleDevelopmentRegion (= en) if none match.
        CFBundleDevelopmentRegion: en
        CFBundleLocalizations:
          - en
          - zh-Hans
          - zh-Hant
          - ja
          - ko
          - es
          - de
          - fr
    entitlements:
      path: Apps/ClaudeWatchMac/ClaudeWatchMac.entitlements
      properties:
        com.apple.security.app-sandbox: false
        # Network for scraping claude.ai
        com.apple.security.network.client: true
        # Future: enable when iCloud is wired (Task 52)
        # com.apple.developer.icloud-services:
        #   - CloudKit
        # com.apple.developer.icloud-container-identifiers:
        #   - iCloud.studio.cybertron.claudewatch.shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: studio.cybertron.claudewatch.mac
        MARKETING_VERSION: "0.1.8"
        CURRENT_PROJECT_VERSION: "10"
        GENERATE_INFOPLIST_FILE: NO
        ENABLE_HARDENED_RUNTIME: YES
        SDKROOT: macosx
        MACOSX_DEPLOYMENT_TARGET: "13.0"
        # Tells actool which AppIcon set in Assets.xcassets to compile
        # as the app icon. The DMG path doesn't strictly need this (Apple
        # Developer ID accepts iconless apps), but Finder/Dock and the
        # menu bar tooltip preview look much better with it set.
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      configs:
        # Debug builds: ad-hoc sign for local dev runs (no cert needed).
        Debug:
          CODE_SIGN_STYLE: Automatic
          CODE_SIGN_IDENTITY: "-"
        # Release builds: sign with Developer ID Application so the .app
        # passes Gatekeeper after notarization. Hardened runtime is
        # already enabled above; that's a notarization prerequisite.
        # CODE_SIGN_INJECT_BASE_ENTITLEMENTS=NO is critical: it stops
        # Xcode from sneaking `com.apple.security.get-task-allow=true`
        # into the binary at sign time, which Apple's notary rejects.
        Release:
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: "Developer ID Application"
          CODE_SIGN_INJECT_BASE_ENTITLEMENTS: NO
          OTHER_CODE_SIGN_FLAGS: "--timestamp --options=runtime"
    dependencies:
      - package: UsageCore
        product: UsageCore

  # ===== macOS Mac App Store build =========================================
  # Mirrors ClaudeWatchMac sources exactly; differs only in:
  #   • App Sandbox enabled (Mac App Store requirement)
  #   • Signed with "Apple Distribution" + Mac App Store provisioning
  #     profile (vs. Developer ID Application + ad-hoc/automatic for the
  #     DMG target)
  #
  # Both targets share Info.plist and Resources, so version bumps and
  # localized strings only need to change in one place.
  #
  # Sandbox redirects ~/Library/Application Support to the per-app
  # container automatically — FileSecretStore and the GRDB snapshots DB
  # don't need code changes; macOS handles it transparently.
  #
  # Existing DMG users are NOT migrated to the sandbox container — by
  # design (option A from brainstorming). Mac App Store users will start
  # fresh with a cURL paste; this is acceptable because the two
  # distribution channels target different audiences.
  ClaudeWatchMacAppStore:
    type: application
    platform: macOS
    sources:
      - path: Apps/ClaudeWatchMac
        excludes:
          - "Info.plist"
          - "ClaudeWatchMac.entitlements"
          - "ClaudeWatchMacAppStore.entitlements"
      - path: Apps/ClaudeWatchMac/Resources
    info:
      path: Apps/ClaudeWatchMac/Info.plist
      properties:
        CFBundleDisplayName: Claude Watch
        CFBundleShortVersionString: "0.1.8"
        CFBundleVersion: "10"
        LSApplicationCategoryType: public.app-category.developer-tools
        # Tells App Store Connect we use only Apple's built-in
        # cryptography (URLSession TLS, code signing, etc.) — i.e.
        # nothing that requires a U.S. BIS export-compliance review.
        # Setting this to false makes ASC skip the "App 加密文稿"
        # dialog on every new build upload.
        ITSAppUsesNonExemptEncryption: false
        LSUIElement: YES
        # Shown in macOS' "About Claude Watch" dialog. Must include the
        # © glyph here (unlike the App Store Connect copyright field,
        # which Apple prefixes automatically).
        NSHumanReadableCopyright: "© 2026 Cybertron Studio"
        NSSupportsAutomaticTermination: YES
        NSSupportsSuddenTermination: YES
        CFBundleDevelopmentRegion: en
        CFBundleLocalizations:
          - en
          - zh-Hans
          - zh-Hant
          - ja
          - ko
          - es
          - de
          - fr
    entitlements:
      path: Apps/ClaudeWatchMac/ClaudeWatchMacAppStore.entitlements
      properties:
        # Mac App Store distribution requires App Sandbox.
        com.apple.security.app-sandbox: true
        # Required so JSONUsageScraper can hit claude.ai over HTTPS,
        # and WKWebView (HiddenChallengeView) can solve Cloudflare.
        com.apple.security.network.client: true
        # CSV export uses NSSavePanel — Powerbox grants Read+Write
        # only when this entitlement is present. Without it, writes to
        # the user-picked path silently fail under sandbox.
        com.apple.security.files.user-selected.read-write: true
        # NOTE: App Group entitlement deliberately omitted. It will be
        # added in the same release that introduces the macOS Widget
        # extension (alongside data path migration to the shared
        # container). Adding it speculatively now triggers
        # provisioning-profile mismatches and invites App Store review
        # questions about why an unused capability is requested.
    settings:
      base:
        # Same Bundle ID as DMG — only one of the two artifacts ever
        # ships to a given user, so there's no collision in practice.
        # The provisioning profile is keyed to this exact ID.
        PRODUCT_BUNDLE_IDENTIFIER: studio.cybertron.claudewatch.mac
        PRODUCT_NAME: "Claude Watch"
        MARKETING_VERSION: "0.1.8"
        CURRENT_PROJECT_VERSION: "10"
        GENERATE_INFOPLIST_FILE: NO
        ENABLE_HARDENED_RUNTIME: YES
        SDKROOT: macosx
        MACOSX_DEPLOYMENT_TARGET: "13.0"
        # Mac App Store strictly requires an icon (1024×1024 in ICNS or
        # asset catalog). actool reads Assets.xcassets/AppIcon.appiconset
        # at build time and emits CFBundleIconName into Info.plist.
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        # Manual signing — Xcode automatic signing tries to issue its
        # own profile, which fights with the one we just installed.
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "Apple Distribution"
        DEVELOPMENT_TEAM: MKSL2N4Y23
        # Match by profile *name* (the human label set in the portal),
        # not UUID — survives profile renewal without project edits.
        PROVISIONING_PROFILE_SPECIFIER: "ClaudeWatch Mac App Store"
        # Same reasoning as DMG target: stop Xcode from injecting
        # get-task-allow=true into the binary at sign time.
        CODE_SIGN_INJECT_BASE_ENTITLEMENTS: NO
        OTHER_CODE_SIGN_FLAGS: "--timestamp --options=runtime"
    dependencies:
      - package: UsageCore
        product: UsageCore

  # ===== iOS app ============================================================
  ClaudeWatchiOS:
    type: application
    platform: iOS
    sources:
      - path: Apps/ClaudeWatchiOS
        excludes:
          - "Info.plist"
          - "ClaudeWatchiOS.entitlements"
    info:
      path: Apps/ClaudeWatchiOS/Info.plist
      properties:
        CFBundleDisplayName: Claude Watch
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        UILaunchStoryboardName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIRequiredDeviceCapabilities:
          - arm64
        # WKWebView communicates with claude.ai over HTTPS — no ATS exception
        # needed.
    entitlements:
      path: Apps/ClaudeWatchiOS/ClaudeWatchiOS.entitlements
      properties:
        # App Group shared with the Widget extension (Task 42).
        com.apple.security.application-groups:
          - group.studio.cybertron.claudewatch.shared
        # Future: enable when iCloud is wired (Task 52)
        # com.apple.developer.icloud-services:
        #   - CloudKit
        # com.apple.developer.icloud-container-identifiers:
        #   - iCloud.studio.cybertron.claudewatch.shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: studio.cybertron.claudewatch.ios
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: NO
        TARGETED_DEVICE_FAMILY: "1,2"
        IPHONEOS_DEPLOYMENT_TARGET: "16.0"
        SDKROOT: iphoneos
    dependencies:
      - package: UsageCore
        product: UsageCore
      # Embedded widget extension is added later (Task 47)

  # ===== iOS Widget extension ===============================================
  # Stub target — populated in Phase 16 (Tasks 47–51).
  # We declare it now so the project structure is in place, but the
  # sources directory is empty until then. XcodeGen only generates a
  # target if the sources directory has at least one file, so we
  # comment it out for now and add it back at Task 47.
  #
  # ClaudeWatchWidgets:
  #   type: app-extension
  #   platform: iOS
  #   ...
