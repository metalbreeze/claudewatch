name: ClaudeWatch
options:
  bundleIdPrefix: studio.cybertron.claudewatch
  deploymentTarget:
    macOS: "13.0"
    iOS: "16.0"
  developmentLanguage: en
  createIntermediateGroups: true
  defaultConfig: Debug
configs:
  Debug: debug
  Release: release

# Local Swift Package Manager package dependency.
# Tests live inside the package — xcodebuild against UsageCore-Package
# scheme runs them. (UsageCore is the internal library name; the
# user-facing app is Claude Watch, but the library still describes
# "usage data" conceptually.)
packages:
  UsageCore:
    path: Packages/UsageCore

settings:
  base:
    SWIFT_VERSION: "5.10"
    SWIFT_STRICT_CONCURRENCY: minimal
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    # Signing config. Debug uses automatic + your dev team for local
    # runs; Release overrides per-target to use the Developer ID
    # Application certificate so notarized DMGs work.
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: MKSL2N4Y23

# ─── Targets ────────────────────────────────────────────────────────────────

targets:

  # ===== macOS menu bar app =================================================
  ClaudeWatchMac:
    type: application
    platform: macOS
    sources:
      - path: Apps/ClaudeWatchMac
        excludes:
          - "Info.plist"
          - "ClaudeWatchMac.entitlements"
      # Each .lproj/Localizable.strings is a variant of one logical
      # localized resource. XcodeGen detects the .lproj naming
      # convention and groups them automatically.
      - path: Apps/ClaudeWatchMac/Resources
    info:
      path: Apps/ClaudeWatchMac/Info.plist
      properties:
        CFBundleDisplayName: Claude Watch
        CFBundleShortVersionString: "0.1.1"
        CFBundleVersion: "2"
        # The whole point of this app — runs in menu bar, no Dock icon.
        LSUIElement: YES
        NSHumanReadableCopyright: ""
        NSSupportsAutomaticTermination: YES
        NSSupportsSuddenTermination: YES
        # Languages the bundle ships translations for. macOS picks the
        # closest match to the user's preferred language list at
        # ~/Library/Preferences/.GlobalPreferences.plist; falls back to
        # CFBundleDevelopmentRegion (= en) if none match.
        CFBundleDevelopmentRegion: en
        CFBundleLocalizations:
          - en
          - zh-Hans
          - zh-Hant
          - ja
          - ko
          - es
          - de
          - fr
    entitlements:
      path: Apps/ClaudeWatchMac/ClaudeWatchMac.entitlements
      properties:
        com.apple.security.app-sandbox: false
        # Network for scraping claude.ai
        com.apple.security.network.client: true
        # Future: enable when iCloud is wired (Task 52)
        # com.apple.developer.icloud-services:
        #   - CloudKit
        # com.apple.developer.icloud-container-identifiers:
        #   - iCloud.studio.cybertron.claudewatch.shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: studio.cybertron.claudewatch.mac
        MARKETING_VERSION: "0.1.1"
        CURRENT_PROJECT_VERSION: "2"
        GENERATE_INFOPLIST_FILE: NO
        ENABLE_HARDENED_RUNTIME: YES
        SDKROOT: macosx
        MACOSX_DEPLOYMENT_TARGET: "13.0"
      configs:
        # Debug builds: ad-hoc sign for local dev runs (no cert needed).
        Debug:
          CODE_SIGN_STYLE: Automatic
          CODE_SIGN_IDENTITY: "-"
        # Release builds: sign with Developer ID Application so the .app
        # passes Gatekeeper after notarization. Hardened runtime is
        # already enabled above; that's a notarization prerequisite.
        # CODE_SIGN_INJECT_BASE_ENTITLEMENTS=NO is critical: it stops
        # Xcode from sneaking `com.apple.security.get-task-allow=true`
        # into the binary at sign time, which Apple's notary rejects.
        Release:
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: "Developer ID Application"
          CODE_SIGN_INJECT_BASE_ENTITLEMENTS: NO
          OTHER_CODE_SIGN_FLAGS: "--timestamp --options=runtime"
    dependencies:
      - package: UsageCore
        product: UsageCore

  # ===== iOS app ============================================================
  ClaudeWatchiOS:
    type: application
    platform: iOS
    sources:
      - path: Apps/ClaudeWatchiOS
        excludes:
          - "Info.plist"
          - "ClaudeWatchiOS.entitlements"
    info:
      path: Apps/ClaudeWatchiOS/Info.plist
      properties:
        CFBundleDisplayName: Claude Watch
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        UILaunchStoryboardName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIRequiredDeviceCapabilities:
          - arm64
        # WKWebView communicates with claude.ai over HTTPS — no ATS exception
        # needed.
    entitlements:
      path: Apps/ClaudeWatchiOS/ClaudeWatchiOS.entitlements
      properties:
        # App Group shared with the Widget extension (Task 42).
        com.apple.security.application-groups:
          - group.studio.cybertron.claudewatch.shared
        # Future: enable when iCloud is wired (Task 52)
        # com.apple.developer.icloud-services:
        #   - CloudKit
        # com.apple.developer.icloud-container-identifiers:
        #   - iCloud.studio.cybertron.claudewatch.shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: studio.cybertron.claudewatch.ios
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: NO
        TARGETED_DEVICE_FAMILY: "1,2"
        IPHONEOS_DEPLOYMENT_TARGET: "16.0"
        SDKROOT: iphoneos
    dependencies:
      - package: UsageCore
        product: UsageCore
      # Embedded widget extension is added later (Task 47)

  # ===== iOS Widget extension ===============================================
  # Stub target — populated in Phase 16 (Tasks 47–51).
  # We declare it now so the project structure is in place, but the
  # sources directory is empty until then. XcodeGen only generates a
  # target if the sources directory has at least one file, so we
  # comment it out for now and add it back at Task 47.
  #
  # ClaudeWatchWidgets:
  #   type: app-extension
  #   platform: iOS
  #   ...
